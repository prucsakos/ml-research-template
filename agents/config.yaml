# agents/config.yaml
# Default model per agent role.
# Override per-dispatch via the model="" attribute in <dispatch> XML.
#
# ID conventions:
#   Pinned snapshot IDs (e.g. claude-haiku-4-5-20251001) guarantee stable behavior.
#   Alias IDs (e.g. claude-sonnet-4-6) resolve to the latest snapshot — behavior
#   may change when Anthropic ships a new snapshot. For fully reproducible runs,
#   replace aliases with pinned IDs once they are published.
orchestrator:  claude-sonnet-4-6          # alias — update to pinned ID for reproducibility
implementer:   claude-haiku-4-5-20251001  # pinned snapshot
test-quality:  claude-haiku-4-5-20251001  # pinned snapshot
performance:   claude-sonnet-4-6          # alias — update to pinned ID for reproducibility
documentation: claude-haiku-4-5-20251001  # pinned snapshot
literature:    claude-opus-4-6            # alias — update to pinned ID for reproducibility
research:      claude-opus-4-6            # alias — update to pinned ID for reproducibility
